<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">Archolith strata column — wider shift + visible gap</title>
  <desc id="desc">Layered column with extracted stratum showing the gap left behind.</desc>
  <rect width="100" height="100" fill="#ECE5D5"/>
  <!-- Column body -->
  <rect x="26" y="10" width="48" height="32" fill="#0F0C09"/>
  <!-- Gap where block was extracted — exposed stone -->
  <rect x="26" y="42" width="16" height="16" fill="#A89A84"/>
  <line x1="26" y1="46" x2="42" y2="46" stroke="#ECE5D5" stroke-width="0.6" stroke-dasharray="2 2"/>
  <line x1="26" y1="54" x2="42" y2="54" stroke="#ECE5D5" stroke-width="0.6" stroke-dasharray="2 2"/>
  <!-- Column below gap -->
  <rect x="26" y="58" width="48" height="32" fill="#0F0C09"/>
  <!-- Seam lines -->
  <line x1="26" y1="26" x2="74" y2="26" stroke="#ECE5D5" stroke-width="1.4"/>
  <line x1="26" y1="42" x2="74" y2="42" stroke="#ECE5D5" stroke-width="1.4"/>
  <line x1="26" y1="58" x2="74" y2="58" stroke="#ECE5D5" stroke-width="1.4"/>
  <line x1="26" y1="74" x2="74" y2="74" stroke="#ECE5D5" stroke-width="1.4"/>
  <!-- Extracted block — shifted far right -->
  <rect x="42" y="42" width="48" height="16" fill="#C2381C"/>
  <line x1="42" y1="42" x2="90" y2="42" stroke="#ECE5D5" stroke-width="1.4"/>
  <line x1="42" y1="58" x2="90" y2="58" stroke="#ECE5D5" stroke-width="1.4"/>
</svg>
