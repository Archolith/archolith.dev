<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Archolith Logo — Color Matrix</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f141c;
  --ink: #d6dde8;
  --ink-2: #98a4b6;
  --ink-mute: #61708a;
  --accent: #6c8fbe;
  --rule: rgba(214,221,232,0.18);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: "Space Grotesk", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

header {
  padding: 48px 48px 32px;
  border-bottom: 1px solid var(--rule);
}
header h1 {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-mute);
}
header h1 span { color: var(--ink); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1px;
  background: var(--rule);
}

.card {
  background: var(--bg);
  padding: 36px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.card__head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
}
.card__name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.card__tag {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mute);
  padding: 3px 8px;
  border: 1px solid var(--rule);
}

.card__swatches {
  display: flex;
  gap: 6px;
  align-items: center;
}
.swatch {
  width: 16px; height: 16px;
  border: 1px solid rgba(214,221,232,0.15);
}
.swatch-label {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9px;
  color: var(--ink-mute);
  letter-spacing: 0.06em;
}

.card__row {
  display: flex;
  align-items: end;
  gap: 20px;
}

.card__logo {
  display: grid;
  place-items: center;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.25);
}
.card__logo img { width: 100%; height: 100%; display: block; }
.card__logo--xl { width: 120px; height: 120px; padding: 8px; }
.card__logo--md { width: 48px; height: 48px; padding: 4px; }
.card__logo--sm { width: 24px; height: 24px; padding: 2px; }

.card__nav {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: rgba(15,20,28,0.92);
  border: 1px solid var(--rule);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.card__nav-shard {
  width: 22px; height: 22px; padding: 2px;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.25);
  display: grid; place-items: center;
}
.card__nav-shard img { width: 100%; height: 100%; display: block; }
.card__nav-links {
  margin-left: auto;
  font-size: 10px;
  color: var(--ink-mute);
  letter-spacing: 0.1em;
}

.card__light {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
}
.card__light-logo { width: 32px; height: 32px; }
.card__light-logo img { width: 100%; height: 100%; display: block; }
.card__light-text {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.card__light-text span {
  display: block;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.1em;
  margin-top: 2px;
  opacity: 0.6;
}

.card__desc {
  font-family: "IBM Plex Mono", monospace;
  font-size: 11px;
  color: var(--ink-mute);
  line-height: 1.5;
}
</style>
</head>
<body>

<header>
  <h1><span>Archolith</span> &mdash; S5 Strata Column &mdash; Color Matrix</h1>
</header>

<div class="grid" id="grid"></div>

<!-- Product Family Section -->
<div class="family-section" id="family-section">
  <div class="family-header">
    <h2>Product Family</h2>
    <p>One mark, per-product accent. Red stays the master brand.</p>
  </div>
</div>

<style>
.family-section {
  border-top: 2px solid var(--accent);
  margin-top: 1px;
}
.family-header {
  padding: 48px 48px 0;
}
.family-header h2 {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink);
  margin-bottom: 6px;
}
.family-header p {
  font-family: "IBM Plex Mono", monospace;
  font-size: 12px;
  color: var(--ink-mute);
  letter-spacing: 0.04em;
}

.family-strip {
  display: flex;
  align-items: stretch;
  gap: 1px;
  background: var(--rule);
  margin-top: 32px;
}
.family-member {
  flex: 1;
  background: var(--bg);
  padding: 36px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  text-align: center;
  position: relative;
}
.family-member--master::after {
  content: "MASTER";
  position: absolute;
  top: 12px;
  right: 12px;
  font-family: "IBM Plex Mono", monospace;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--accent);
  padding: 2px 6px;
  border: 1px solid var(--accent);
}
.family-logo {
  width: 96px; height: 96px;
  padding: 6px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.25);
  display: grid; place-items: center;
}
.family-logo img { width: 100%; height: 100%; display: block; }
.family-name {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.family-pkg {
  font-family: "IBM Plex Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--ink-2);
}
.family-role {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid var(--rule);
}
.family-swatch {
  width: 100%;
  height: 3px;
  margin-top: auto;
}

/* Lockup row */
.family-lockups {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1px;
  background: var(--rule);
}
.family-lockup {
  background: var(--bg);
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.family-lockup__label {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.family-lockup__row {
  display: flex;
  align-items: center;
  gap: 14px;
}
.family-lockup__mark {
  width: 36px; height: 36px; padding: 3px; flex-shrink: 0;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  display: grid; place-items: center;
}
.family-lockup__mark img { width: 100%; height: 100%; display: block; }
.family-lockup__text {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.family-lockup__text span {
  font-weight: 400;
  opacity: 0.5;
}
.family-lockup__sub {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Badge row */
.family-badges {
  display: flex;
  gap: 1px;
  background: var(--rule);
  flex-wrap: wrap;
}
.family-badge {
  flex: 1;
  min-width: 180px;
  background: var(--bg);
  padding: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.family-badge__mark {
  width: 20px; height: 20px; padding: 1px; flex-shrink: 0;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  display: grid; place-items: center;
}
.family-badge__mark img { width: 100%; height: 100%; display: block; }
.family-badge__text {
  font-family: "IBM Plex Mono", monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
}

/* GitHub-style cards */
.family-repos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1px;
  background: var(--rule);
}
.family-repo {
  background: var(--bg);
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-left: 3px solid transparent;
}
.family-repo__head {
  display: flex;
  align-items: center;
  gap: 10px;
}
.family-repo__icon {
  width: 18px; height: 18px; padding: 1px; flex-shrink: 0;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
  display: grid; place-items: center;
}
.family-repo__icon img { width: 100%; height: 100%; display: block; }
.family-repo__name {
  font-size: 14px;
  font-weight: 600;
}
.family-repo__desc {
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.5;
}
.family-repo__meta {
  display: flex;
  gap: 16px;
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  color: var(--ink-mute);
  letter-spacing: 0.06em;
}
.family-repo__dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 4px;
  vertical-align: middle;
}
</style>

<script>
var variants = [
  {
    name: "Original",
    tag: "current",
    stone: "#ECE5D5",
    block: "#0F0C09",
    accent: "#C2381C",
    desc: "Warm cream stone, near-black column, brick red extraction. The baseline.",
    lightBg: "#f0ebe0",
    lightText: "#0f0c09",
  },
  {
    name: "Cooled Brick",
    tag: "subtle",
    stone: "#E4E0D6",
    block: "#0F0C09",
    accent: "#9E3328",
    desc: "Cooler stone, desaturated red. Less 'alert', more geological.",
    lightBg: "#eae7df",
    lightText: "#0f0c09",
  },
  {
    name: "Slate Blue",
    tag: "site-aligned",
    stone: "#E2E6EC",
    block: "#0F0C09",
    accent: "#4A6D96",
    desc: "Cool gray stone, site accent blue. Ties directly to the UI palette.",
    lightBg: "#e8ecf2",
    lightText: "#0f0c09",
  },
  {
    name: "Warm Amber",
    tag: "earthy",
    stone: "#ECE5D5",
    block: "#0F0C09",
    accent: "#B8762A",
    desc: "Original stone, amber extraction. Reads as 'unearthed treasure'.",
    lightBg: "#f0ebe0",
    lightText: "#0f0c09",
  },
  {
    name: "Oxidized",
    tag: "industrial",
    stone: "#D9D3C6",
    block: "#1A1714",
    accent: "#8B4D32",
    desc: "Muted stone, dark umber, burnt sienna. Weathered industrial feel.",
    lightBg: "#e0dbd0",
    lightText: "#1a1714",
  },
  {
    name: "Deep Teal",
    tag: "contrast",
    stone: "#E0E8E6",
    block: "#0F0C09",
    accent: "#2D7A6E",
    desc: "Mint-gray stone, teal extraction. High contrast, modern.",
    lightBg: "#e6edeb",
    lightText: "#0f0c09",
  },
  {
    name: "Concrete",
    tag: "monochrome",
    stone: "#D4D4D4",
    block: "#1C1C1C",
    accent: "#6B6B6B",
    desc: "No color. Pure concrete gray. The shape does all the work.",
    lightBg: "#e8e8e8",
    lightText: "#1c1c1c",
  },
  {
    name: "Night Inverse",
    tag: "dark mode",
    stone: "#161d28",
    block: "#d6dde8",
    accent: "#C2381C",
    desc: "Inverted for dark contexts. Light column on dark stone, red holds.",
    lightBg: "#0f141c",
    lightText: "#d6dde8",
  },
];

function buildSVG(stone, block, accent) {
  return "data:image/svg+xml," + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">' +
    '<rect width="100" height="100" fill="' + stone + '"/>' +
    '<rect x="26" y="10" width="48" height="80" fill="' + block + '"/>' +
    '<line x1="26" y1="26" x2="74" y2="26" stroke="' + stone + '" stroke-width="1.4"/>' +
    '<line x1="26" y1="42" x2="74" y2="42" stroke="' + stone + '" stroke-width="1.4"/>' +
    '<line x1="26" y1="58" x2="74" y2="58" stroke="' + stone + '" stroke-width="1.4"/>' +
    '<line x1="26" y1="74" x2="74" y2="74" stroke="' + stone + '" stroke-width="1.4"/>' +
    '<rect x="34" y="42" width="48" height="16" fill="' + accent + '"/>' +
    '<line x1="34" y1="58" x2="82" y2="58" stroke="' + stone + '" stroke-width="1.4"/>' +
    '<line x1="34" y1="42" x2="82" y2="42" stroke="' + stone + '" stroke-width="1.4"/>' +
    '</svg>'
  );
}

var grid = document.getElementById("grid");

variants.forEach(function(v) {
  var src = buildSVG(v.stone, v.block, v.accent);
  var borderCol = v.stone === "#161d28" ? "rgba(214,221,232,0.2)" : "rgba(15,20,28,0.12)";

  var html = '<div class="card">' +
    '<div class="card__head">' +
      '<span class="card__name">' + v.name + '</span>' +
      '<span class="card__tag">' + v.tag + '</span>' +
    '</div>' +
    '<div class="card__swatches">' +
      '<div class="swatch" style="background:' + v.stone + '"></div>' +
      '<div class="swatch" style="background:' + v.block + '"></div>' +
      '<div class="swatch" style="background:' + v.accent + '"></div>' +
      '<span class="swatch-label">' + v.stone + ' / ' + v.block + ' / ' + v.accent + '</span>' +
    '</div>' +
    '<div class="card__row">' +
      '<div class="card__logo card__logo--xl" style="background:' + v.stone + ';border:1px solid ' + borderCol + '"><img src="' + src + '" alt=""></div>' +
      '<div style="display:flex;flex-direction:column;gap:10px;">' +
        '<div class="card__logo card__logo--md" style="background:' + v.stone + ';border:1px solid ' + borderCol + '"><img src="' + src + '" alt=""></div>' +
        '<div class="card__logo card__logo--sm" style="background:' + v.stone + ';border:1px solid ' + borderCol + '"><img src="' + src + '" alt=""></div>' +
      '</div>' +
    '</div>' +
    '<div class="card__nav">' +
      '<span class="card__nav-shard" style="background:' + v.stone + ';border:1px solid ' + borderCol + '"><img src="' + src + '" alt=""></span>' +
      'ARCHOLITH' +
      '<span class="card__nav-links">Docs &middot; GitHub</span>' +
    '</div>' +
    '<div class="card__light" style="background:' + v.lightBg + ';border:1px solid ' + borderCol + ';">' +
      '<div class="card__light-logo"><img src="' + src + '" alt=""></div>' +
      '<div class="card__light-text" style="color:' + v.lightText + '">Archolith<span>Context compressed, not replayed</span></div>' +
    '</div>' +
    '<p class="card__desc">' + v.desc + '</p>' +
  '</div>';

  grid.insertAdjacentHTML("beforeend", html);
});
</script>

<script>
void function() {
  var stone = "#ECE5D5";
  var block = "#0F0C09";

  var products = [
    { name: "Archolith", pkg: "archolith", accent: "#C2381C", role: "Parent brand", desc: "Self-hosted context compression for LLMs.", master: true },
    { name: "Proxy", pkg: "archolith-proxy", accent: "#56a8e8", role: "The boundary", desc: "OpenAI-compatible proxy. Request interception, context assembly, upstream forwarding." },
    { name: "Memory", pkg: "menhir", accent: "#82729e", role: "The graph", desc: "Temporal knowledge graph. Fact extraction, session scope, promotion gate." },
    { name: "Filter", pkg: "archolith-filter", accent: "#c29b58", role: "The compressor", desc: "Selective compression post-assembly. Token budget, dedup, supersession." },
    { name: "Session", pkg: "archolith-session", accent: "#62a98c", role: "Working state", desc: "Label-scoped transient context. TTL 24h, graph-assembled, bulk-droppable." },
    { name: "Foundation", pkg: "archolith-foundation", accent: "#a28670", role: "The base", desc: "Schema rails, structural grid, bedrock conventions." },
  ];

  var section = document.getElementById("family-section");

  // --- Strip of logos ---
  var strip = '<div class="family-strip">';
  products.forEach(function(p) {
    var src = buildSVG(stone, block, p.accent);
    strip += '<div class="family-member' + (p.master ? " family-member--master" : "") + '">' +
      '<div class="family-logo" style="background:' + stone + ';border:1px solid rgba(15,20,28,0.12)"><img src="' + src + '" alt=""></div>' +
      '<div class="family-name">' + p.name + '</div>' +
      '<div class="family-pkg">' + p.pkg + '</div>' +
      '<div class="family-role" style="color:' + p.accent + ';border-color:' + p.accent + '44">' + p.role + '</div>' +
      '<div class="family-swatch" style="background:' + p.accent + '"></div>' +
      '</div>';
  });
  strip += '</div>';

  // --- Lockup row (text + mark combos) ---
  var lockups = '<div class="family-lockups">';
  products.forEach(function(p) {
    var src = buildSVG(stone, block, p.accent);
    lockups += '<div class="family-lockup">' +
      '<div class="family-lockup__label">Lockup &middot; ' + p.pkg + '</div>' +
      '<div class="family-lockup__row">' +
        '<div class="family-lockup__mark" style="background:' + stone + ';border:1px solid rgba(15,20,28,0.12)"><img src="' + src + '" alt=""></div>' +
        '<div>' +
          '<div class="family-lockup__text">Archolith' + (p.master ? '' : '<span>-' + p.pkg.replace('archolith-','') + '</span>') + '</div>' +
          '<div class="family-lockup__sub" style="color:' + p.accent + '">' + p.role + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  });
  lockups += '</div>';

  // --- Inline badges ---
  var badges = '<div class="family-badges">';
  products.forEach(function(p) {
    var src = buildSVG(stone, block, p.accent);
    badges += '<div class="family-badge">' +
      '<div class="family-badge__mark" style="background:' + stone + ';border:1px solid rgba(15,20,28,0.12)"><img src="' + src + '" alt=""></div>' +
      '<div class="family-badge__text" style="color:' + p.accent + '">' + p.pkg + '</div>' +
    '</div>';
  });
  badges += '</div>';

  // --- GitHub-style repo cards ---
  var repos = '<div class="family-repos">';
  products.forEach(function(p) {
    var src = buildSVG(stone, block, p.accent);
    repos += '<div class="family-repo" style="border-left-color:' + p.accent + '">' +
      '<div class="family-repo__head">' +
        '<div class="family-repo__icon" style="background:' + stone + ';border:1px solid rgba(15,20,28,0.12)"><img src="' + src + '" alt=""></div>' +
        '<div class="family-repo__name">' + p.pkg + '</div>' +
      '</div>' +
      '<div class="family-repo__desc">' + p.desc + '</div>' +
      '<div class="family-repo__meta">' +
        '<span><span class="family-repo__dot" style="background:' + p.accent + '"></span>Kotlin</span>' +
        '<span>Apache-2.0</span>' +
      '</div>' +
    '</div>';
  });
  repos += '</div>';

  section.insertAdjacentHTML("beforeend", strip + lockups + badges + repos);
}();
</script>

</body>
</html>
